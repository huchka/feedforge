name: ci

# Fast PR-time validation. No GCP auth, no image push.
# Just confirms both Dockerfiles still build cleanly before merge.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check:
    name: docker build (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: false
          load: false
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max

  validate-manifests:
    name: kustomize render (${{ matrix.overlay }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        overlay: [dev, local]
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      # The local overlay references secret-notification.yaml, which is
      # gitignored (each developer fills in real LINE creds locally). For CI
      # render-only validation, copy the committed .example to the expected
      # path. Stubs are fine here -- we never apply the rendered manifest.
      - name: Bootstrap local secrets (placeholder)
        if: matrix.overlay == 'local'
        run: |
          cp k8s/overlays/local/secret-notification.yaml.example \
             k8s/overlays/local/secret-notification.yaml

      - name: Render overlay
        run: |
          kubectl kustomize k8s/overlays/${{ matrix.overlay }} > rendered.yaml
          test -s rendered.yaml

      - name: Schema validation (kubeconform)
        uses: docker://ghcr.io/yannh/kubeconform:latest-alpine
        with:
          args: -strict -ignore-missing-schemas -summary rendered.yaml
