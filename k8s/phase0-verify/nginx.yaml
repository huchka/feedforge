apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-hello
  labels:
    app.kubernetes.io/name: nginx-hello
    app.kubernetes.io/component: verification
    app.kubernetes.io/part-of: feedforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-hello
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-hello
        app.kubernetes.io/component: verification
        app.kubernetes.io/part-of: feedforge
    spec:
      automountServiceAccountToken: false
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-hello
  labels:
    app.kubernetes.io/name: nginx-hello
    app.kubernetes.io/component: verification
    app.kubernetes.io/part-of: feedforge
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: nginx-hello
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
