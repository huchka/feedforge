apiVersion: apps/v1
kind: Deployment
metadata:
  name: summarizer
  namespace: feedforge
  labels:
    app.kubernetes.io/name: summarizer
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: feedforge
spec:
  # replicas managed by HPA (summarizer/hpa.yaml)
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: summarizer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: summarizer
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: feedforge
    spec:
      serviceAccountName: summarizer
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
      terminationGracePeriodSeconds: 45
      containers:
        - name: summarizer
          image: us-central1-docker.pkg.dev/project-76da2d1f-231c-4c94-ae9/feedforge/backend:cloud-sql
          command: ["python", "-m", "app.summarizer"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: FEEDFORGE_DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: FEEDFORGE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.15.2
          args:
            - "--structured-logs"
            - "--private-ip"
            - "--port=5432"
            - "$(CLOUD_SQL_INSTANCE)"
          envFrom:
            - configMapRef:
                name: backend-config
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
