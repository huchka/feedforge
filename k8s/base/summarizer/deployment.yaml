apiVersion: apps/v1
kind: Deployment
metadata:
  name: summarizer
  namespace: feedforge
  labels:
    app.kubernetes.io/name: summarizer
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: feedforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: summarizer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: summarizer
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: feedforge
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: summarizer
          image: us-central1-docker.pkg.dev/project-76da2d1f-231c-4c94-ae9/feedforge/backend:0.2.1
          command: ["python", "-m", "app.summarizer"]
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: FEEDFORGE_DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: FEEDFORGE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
