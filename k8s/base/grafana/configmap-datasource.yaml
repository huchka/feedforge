apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: feedforge
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: feedforge
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.feedforge.svc.cluster.local:9090
        isDefault: true
        editable: false
