apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: notification-credentials
  namespace: feedforge
  labels:
    app.kubernetes.io/name: secret-store
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: feedforge
spec:
  provider: gcp
  parameters:
    # TODO: Replace PROJECT_ID with your GCP project ID before deploying.
    # Create secrets in GCP Secret Manager:
    #   gcloud secrets create feedforge-notification-webhook-url --replication-policy="automatic"
    #   gcloud secrets create feedforge-line-channel-token --replication-policy="automatic"
    #   gcloud secrets create feedforge-line-user-id --replication-policy="automatic"
    secrets: |
      - resourceName: "projects/PROJECT_ID/secrets/feedforge-notification-webhook-url/versions/latest"
        path: "NOTIFICATION_WEBHOOK_URL"
      - resourceName: "projects/PROJECT_ID/secrets/feedforge-line-channel-token/versions/latest"
        path: "LINE_CHANNEL_TOKEN"
      - resourceName: "projects/PROJECT_ID/secrets/feedforge-line-user-id/versions/latest"
        path: "LINE_USER_ID"
  secretObjects:
    - secretName: notification-credentials
      type: Opaque
      data:
        - objectName: "NOTIFICATION_WEBHOOK_URL"
          key: NOTIFICATION_WEBHOOK_URL
        - objectName: "LINE_CHANNEL_TOKEN"
          key: LINE_CHANNEL_TOKEN
        - objectName: "LINE_USER_ID"
          key: LINE_USER_ID
