apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudsql-proxy-allow-clients
  namespace: feedforge
  labels:
    app.kubernetes.io/name: cloudsql-proxy
    app.kubernetes.io/component: database-proxy
    app.kubernetes.io/part-of: feedforge
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cloudsql-proxy
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: backend
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: summarizer
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: feed-fetcher
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: daily-digest
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: db-backup
      ports:
        - protocol: TCP
          port: 5432
