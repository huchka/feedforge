apiVersion: batch/v1
kind: Job
metadata:
  name: db-backup
  namespace: feedforge
  labels:
    app.kubernetes.io/name: db-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: feedforge
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-backup
        app.kubernetes.io/component: backup
        app.kubernetes.io/part-of: feedforge
    spec:
      serviceAccountName: db-backup
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
      containers:
        - name: pg-dump
          image: postgres:16.6-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eo pipefail
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              OBJECT="feedforge-${TIMESTAMP}.sql.gz"
              pg_dump -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" --no-password | gzip > /tmp/backup.sql.gz
              TOKEN=$(wget -q -O- --header="Metadata-Flavor: Google" \
                "http://169.254.169.254/computeMetadata/v1/instance/service-accounts/default/token" | \
                sed 's/.*"access_token":"\([^"]*\)".*/\1/')
              wget -q -O /dev/null --post-file=/tmp/backup.sql.gz \
                --header="Authorization: Bearer ${TOKEN}" \
                --header="Content-Type: application/gzip" \
                "https://storage.googleapis.com/upload/storage/v1/b/${BACKUP_BUCKET}/o?uploadType=media&name=${OBJECT}"
              echo "Backup uploaded: gs://${BACKUP_BUCKET}/${OBJECT}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: backup-config
          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
