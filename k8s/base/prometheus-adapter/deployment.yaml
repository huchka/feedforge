apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-adapter
  namespace: feedforge
  labels:
    app.kubernetes.io/name: prometheus-adapter
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: feedforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus-adapter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus-adapter
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/part-of: feedforge
    spec:
      serviceAccountName: prometheus-adapter
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: prometheus-adapter
          image: registry.k8s.io/prometheus-adapter/prometheus-adapter:v0.12.0
          args:
            - --prometheus-url=http://prometheus.feedforge.svc.cluster.local:9090
            - --metrics-relist-interval=30s
            - --config=/etc/adapter/config.yaml
            - --secure-port=6443
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 6443
              name: https
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/adapter
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: certs
              mountPath: /apiserver.local.config
      volumes:
        - name: config
          configMap:
            name: prometheus-adapter-config
        - name: tmp
          emptyDir: {}
        - name: certs
          emptyDir: {}
