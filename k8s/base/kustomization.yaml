apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Secrets are managed via GCP Secret Manager and synced by the Secrets Store
# CSI Driver. See docs/secret-manager.md for provisioning instructions.

resources:
  - namespace.yaml
  - namespace-quota.yaml
  - namespace-limitrange.yaml
  - redis
  - backend
  - frontend
  - gateway
  - fetcher
  - summarizer
  - digest
  - secret-store
  # Observability (prometheus, grafana, kube-state-metrics, prometheus-adapter)
  # is opt-in via components: see k8s/components/monitoring{,-hpa-bridge}/.
  # Add to an overlay's components: list to include them.
