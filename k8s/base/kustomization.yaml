apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# GCP-specific concerns (Cloud SQL Auth Proxy, Secret Store CSI, Workload
# Identity SA annotations) live in components/postgres-cloudsql.  Local
# Postgres (CNPG) lives in components/postgres-cnpg.  Each overlay picks
# its DB strategy via the components: list.

resources:
  - namespace.yaml
  - namespace-quota.yaml
  - namespace-limitrange.yaml
  - redis
  - backend
  - frontend
  - gateway
  - fetcher
  - summarizer
  - digest
  # Observability (prometheus, grafana, kube-state-metrics, prometheus-adapter)
  # is opt-in via components: see k8s/components/monitoring{,-hpa-bridge}/.
  # Add to an overlay's components: list to include them.
