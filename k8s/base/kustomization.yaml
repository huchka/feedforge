apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Secret not listed here — apply it separately before running kustomize:
#   cp k8s/base/postgres/secret-postgres.yaml.example k8s/base/postgres/secret-postgres.yaml
#   # edit with real password
#   kubectl apply -f k8s/base/postgres/secret-postgres.yaml

resources:
  - namespace.yaml
  - namespace-quota.yaml
  - namespace-limitrange.yaml
  - postgres/serviceaccount.yaml
  - postgres/service.yaml
  - postgres/statefulset.yaml
  - postgres/networkpolicy.yaml
  - redis/serviceaccount.yaml
  - redis/deployment.yaml
  - redis/service.yaml
  - redis/networkpolicy.yaml
  - backend/serviceaccount.yaml
  - backend/configmap.yaml
  - backend/service.yaml
  - backend/deployment.yaml
  - backend/hpa.yaml
  - backend/pdb.yaml
  - frontend/serviceaccount.yaml
  - frontend/service.yaml
  - frontend/deployment.yaml
  - frontend/pdb.yaml
  - ingress/ingress.yaml
  - ingress/backend-config.yaml
  - fetcher/serviceaccount.yaml
  - fetcher/cronjob.yaml
  - summarizer/serviceaccount.yaml
  - summarizer/deployment.yaml
  - summarizer/hpa.yaml
  - summarizer/pdb.yaml
  - digest/serviceaccount.yaml
  - digest/cronjob.yaml
  - backup/serviceaccount.yaml
  - backup/configmap.yaml
  - backup/job.yaml
  - prometheus/serviceaccount.yaml
  - prometheus/configmap.yaml
  - prometheus/deployment.yaml
  - prometheus/service.yaml
  - prometheus/networkpolicy.yaml
  - grafana/serviceaccount.yaml
  - grafana/configmap-datasource.yaml
  - grafana/configmap-dashboard-provider.yaml
  - grafana/configmap-dashboard.yaml
  - grafana/deployment.yaml
  - grafana/service.yaml
  - prometheus-adapter/serviceaccount.yaml
  - prometheus-adapter/configmap.yaml
  - prometheus-adapter/deployment.yaml
  - prometheus-adapter/service.yaml
  - prometheus-adapter/clusterroles.yaml
  - prometheus-adapter/apiservice.yaml
  - prometheus-adapter/networkpolicy.yaml
