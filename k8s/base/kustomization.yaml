apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Secrets are managed via GCP Secret Manager and synced by the Secrets Store
# CSI Driver. See docs/secret-manager.md for provisioning instructions.

resources:
  - namespace.yaml
  - namespace-quota.yaml
  - namespace-limitrange.yaml
  - redis
  - backend
  - frontend
  - gateway
  - fetcher
  - summarizer
  - digest
  - prometheus
  - grafana
  - prometheus-adapter
  - kube-state-metrics
  - secret-store
