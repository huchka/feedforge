apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Cloud SQL credentials secret — apply separately before deploying:
#   Edit k8s/base/postgres/secret-postgres.yaml with Cloud SQL password
#   kubectl apply -f k8s/base/postgres/secret-postgres.yaml

resources:
  - namespace.yaml
  - namespace-quota.yaml
  - namespace-limitrange.yaml
  - redis/serviceaccount.yaml
  - redis/deployment.yaml
  - redis/service.yaml
  - redis/networkpolicy.yaml
  - backend/serviceaccount.yaml
  - backend/configmap.yaml
  - backend/service.yaml
  - backend/deployment.yaml
  - backend/hpa.yaml
  - backend/pdb.yaml
  - frontend/serviceaccount.yaml
  - frontend/service.yaml
  - frontend/deployment.yaml
  - frontend/pdb.yaml
  - gateway/gateway.yaml
  - gateway/httproute.yaml
  - gateway/backend-policy.yaml
  - gateway/healthcheck-policy.yaml
  - fetcher/serviceaccount.yaml
  - fetcher/cronjob.yaml
  - summarizer/serviceaccount.yaml
  - summarizer/deployment.yaml
  - summarizer/hpa.yaml
  - summarizer/pdb.yaml
  - digest/serviceaccount.yaml
  - digest/cronjob.yaml
  - prometheus/serviceaccount.yaml
  - prometheus/configmap.yaml
  - prometheus/deployment.yaml
