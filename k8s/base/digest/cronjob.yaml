apiVersion: batch/v1
kind: CronJob
metadata:
  name: daily-digest
  namespace: feedforge
  labels:
    app.kubernetes.io/name: daily-digest
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: feedforge
spec:
  schedule: "30 23 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: daily-digest
            app.kubernetes.io/component: worker
            app.kubernetes.io/part-of: feedforge
        spec:
          serviceAccountName: daily-digest
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
          initContainers:
            - name: cloud-sql-proxy
              image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.15.2
              restartPolicy: Always
              args:
                - "--structured-logs"
                - "--private-ip"
                - "--port=5432"
                - "$(CLOUD_SQL_INSTANCE)"
              envFrom:
                - configMapRef:
                    name: backend-config
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 50m
                  memory: 64Mi
          containers:
            - name: digest
              image: us-central1-docker.pkg.dev/project-76da2d1f-231c-4c94-ae9/feedforge/backend:cloud-sql
              command: ["python", "-m", "app.digest"]
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              envFrom:
                - configMapRef:
                    name: backend-config
              env:
                - name: FEEDFORGE_DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: POSTGRES_USER
                - name: FEEDFORGE_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: POSTGRES_PASSWORD
                - name: FEEDFORGE_DIGEST_PROVIDER
                  value: "line"
                - name: FEEDFORGE_DIGEST_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: notification-credentials
                      key: NOTIFICATION_WEBHOOK_URL
                      optional: true
                - name: FEEDFORGE_DIGEST_LINE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: notification-credentials
                      key: LINE_CHANNEL_TOKEN
                      optional: true
                - name: FEEDFORGE_DIGEST_LINE_USER_ID
                  valueFrom:
                    secretKeyRef:
                      name: notification-credentials
                      key: LINE_USER_ID
                      optional: true
              volumeMounts:
                - name: postgres-creds
                  mountPath: /mnt/secrets/postgres
                  readOnly: true
                - name: notification-creds
                  mountPath: /mnt/secrets/notification
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
          volumes:
            - name: postgres-creds
              csi:
                driver: secrets-store.csi.k8s.io
                readOnly: true
                volumeAttributes:
                  secretProviderClass: postgres-credentials
            - name: notification-creds
              csi:
                driver: secrets-store.csi.k8s.io
                readOnly: true
                volumeAttributes:
                  secretProviderClass: notification-credentials
