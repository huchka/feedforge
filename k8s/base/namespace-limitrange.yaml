apiVersion: v1
kind: LimitRange
metadata:
  name: feedforge-limits
  namespace: feedforge
  labels:
    app.kubernetes.io/part-of: feedforge
spec:
  limits:
    - type: Container
      default:
        cpu: 100m
        memory: 128Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: 200m
        memory: 512Mi
