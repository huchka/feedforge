apiVersion: batch/v1
kind: CronJob
metadata:
  name: daily-digest
  namespace: feedforge
spec:
  jobTemplate:
    spec:
      template:
        spec:
          initContainers:
            - name: cloud-sql-proxy
              image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.15.2
              restartPolicy: Always
              args:
                - "--structured-logs"
                - "--private-ip"
                - "--port=5432"
                - "$(CLOUD_SQL_INSTANCE)"
              envFrom:
                - configMapRef:
                    name: backend-config
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 50m
                  memory: 64Mi
          containers:
            - name: digest
              volumeMounts:
                - name: postgres-creds
                  mountPath: /mnt/secrets/postgres
                  readOnly: true
                - name: notification-creds
                  mountPath: /mnt/secrets/notification
                  readOnly: true
          volumes:
            - name: postgres-creds
              csi:
                driver: secrets-store.csi.k8s.io
                readOnly: true
                volumeAttributes:
                  secretProviderClass: postgres-credentials
            - name: notification-creds
              csi:
                driver: secrets-store.csi.k8s.io
                readOnly: true
                volumeAttributes:
                  secretProviderClass: notification-credentials
