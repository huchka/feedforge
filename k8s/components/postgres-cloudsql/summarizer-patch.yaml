# Add the Cloud SQL Auth Proxy as a sidecar container (not init) and the
# Secret-Store CSI volume. Sidecar pattern keeps the proxy alive for the
# summarizer's worker loop. Strategic merge appends cloud-sql-proxy after
# the summarizer container, matching the original base-file ordering.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: summarizer
  namespace: feedforge
spec:
  template:
    spec:
      containers:
        - name: summarizer
          volumeMounts:
            - name: postgres-creds
              mountPath: /mnt/secrets/postgres
              readOnly: true
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.15.2
          args:
            - "--structured-logs"
            - "--private-ip"
            - "--port=5432"
            - "$(CLOUD_SQL_INSTANCE)"
          envFrom:
            - configMapRef:
                name: backend-config
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: postgres-creds
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: postgres-credentials
