apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: postgres-credentials
  namespace: feedforge
  labels:
    app.kubernetes.io/name: secret-store
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: feedforge
spec:
  provider: gcp
  parameters:
    # TODO: Replace PROJECT_ID with your GCP project ID before deploying.
    # Create secrets in GCP Secret Manager:
    #   gcloud secrets create feedforge-postgres-user --replication-policy="automatic"
    #   gcloud secrets create feedforge-postgres-password --replication-policy="automatic"
    #   echo -n "feedforge" | gcloud secrets versions add feedforge-postgres-user --data-file=-
    #   echo -n "<password>" | gcloud secrets versions add feedforge-postgres-password --data-file=-
    secrets: |
      - resourceName: "projects/PROJECT_ID/secrets/feedforge-postgres-user/versions/latest"
        path: "POSTGRES_USER"
      - resourceName: "projects/PROJECT_ID/secrets/feedforge-postgres-password/versions/latest"
        path: "POSTGRES_PASSWORD"
