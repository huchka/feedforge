# Add the Cloud SQL Auth Proxy init container (sidecar pattern via
# restartPolicy: Always) and the Secret-Store CSI volume to the fetcher
# CronJob. The proxy is the only initContainer; ordering directives aren't
# needed.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: feed-fetcher
  namespace: feedforge
spec:
  jobTemplate:
    spec:
      template:
        spec:
          initContainers:
            - name: cloud-sql-proxy
              image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.15.2
              restartPolicy: Always
              args:
                - "--structured-logs"
                - "--private-ip"
                - "--port=5432"
                - "$(CLOUD_SQL_INSTANCE)"
              envFrom:
                - configMapRef:
                    name: backend-config
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 50m
                  memory: 64Mi
          containers:
            - name: fetcher
              volumeMounts:
                - name: postgres-creds
                  mountPath: /mnt/secrets/postgres
                  readOnly: true
          volumes:
            - name: postgres-creds
              csi:
                driver: secrets-store.csi.k8s.io
                readOnly: true
                volumeAttributes:
                  secretProviderClass: postgres-credentials
