# Strip log-exporter (GCP Cloud Logging sidecar — not useful in kind),
# rewrite the migration init container to wait for the CNPG primary's TCP
# port (avoids a startup race when initdb hasn't finished), and expose the
# debugpy port for local debugging.
#
# The cloud-sql-proxy init container and the postgres-creds CSI volume are
# now added by components/postgres-cloudsql, so they aren't in base — no
# delete directives needed here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: feedforge
spec:
  template:
    spec:
      initContainers:
        - name: log-exporter
          $patch: delete
        - name: run-migrations
          command:
            - sh
            - -c
            - |
              until python -c "import socket; socket.create_connection(('$FEEDFORGE_DB_HOST', int('$FEEDFORGE_DB_PORT')), timeout=2).close()" 2>/dev/null; do
                echo "waiting for $FEEDFORGE_DB_HOST:$FEEDFORGE_DB_PORT..."
                sleep 2
              done
              alembic upgrade head
      containers:
        - name: backend
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 5678
              name: debugpy
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
      volumes:
        - name: app-logs
          emptyDir: {}
