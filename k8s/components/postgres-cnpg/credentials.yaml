# Dev-only credentials for the local in-cluster Postgres.
# Both naming conventions are present:
#   - username/password — CNPG bootstrap (kubernetes.io/basic-auth contract)
#   - POSTGRES_USER/POSTGRES_PASSWORD — backend's existing secretKeyRef lookups
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: feedforge
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: feedforge
type: kubernetes.io/basic-auth
stringData:
  username: feedforge
  password: feedforge
  POSTGRES_USER: feedforge
  POSTGRES_PASSWORD: feedforge
