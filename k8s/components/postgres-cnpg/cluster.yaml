apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: feedforge-db
  namespace: feedforge
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: feedforge
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: feedforge
      owner: feedforge
      secret:
        name: postgres-credentials
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
