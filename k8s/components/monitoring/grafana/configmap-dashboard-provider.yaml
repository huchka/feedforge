apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: feedforge
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: feedforge
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: feedforge
        type: file
        disableDeletion: true
        options:
          path: /etc/grafana/dashboards
      - name: feedforge-cluster
        type: file
        disableDeletion: true
        options:
          path: /etc/grafana/dashboards/cluster
