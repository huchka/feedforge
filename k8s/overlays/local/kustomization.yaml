apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Local development overlay (Tier 2).
#
# Targets a kind cluster with Calico CNI and CloudNativePG operator.
# See k8s/local/kind-config.yaml and scripts/local-cluster-up.sh.
#
# Composition:
#   - base resources: backend, frontend, redis, fetcher, summarizer, digest
#   - postgres-cnpg component swaps Cloud SQL for in-cluster CNPG
#   - monitoring component adds Prometheus + Grafana + kube-state-metrics
#     (monitoring-hpa-bridge is omitted — prometheus-adapter requires
#     cross-namespace RBAC bootstrap that's painful in kind)
#   - overlay-level patches handle local-only concerns: debugpy port, HPA
#     removal (no metrics-server / prometheus-adapter in kind), DEBUG flags

resources:
  - namespace.yaml
  - ../../base/redis
  - ../../base/backend
  - ../../base/frontend
  - ../../base/fetcher
  - ../../base/summarizer
  - ../../base/digest

components:
  - ../../components/postgres-cnpg
  - ../../components/monitoring

patches:
  # Delete HPAs — kind has no metrics-server / prometheus-adapter by default
  - patch: |
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: backend
        namespace: feedforge
  - patch: |
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: summarizer
        namespace: feedforge
  - path: patches/backend-config-patch.yaml
  - path: patches/backend-service-patch.yaml
