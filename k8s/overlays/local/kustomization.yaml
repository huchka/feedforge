apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Local development overlay (Tier 2).
#
# Targets a kind cluster with Calico CNI and CloudNativePG operator.
# See k8s/local/kind-config.yaml and scripts/local-cluster-up.sh.
#
# Composition:
#   - all 7 base workloads (redis, backend, frontend, fetcher, summarizer,
#     digest, plus CNPG postgres provisioned by the postgres-cnpg component)
#   - postgres-cnpg component swaps Cloud SQL for in-cluster CNPG
#   - monitoring component adds Prometheus + Grafana + kube-state-metrics
#     (without monitoring-hpa-bridge — prometheus-adapter requires a
#     cross-namespace RBAC bootstrap that's painful in kind)
#   - overlay-level patches handle local-only concerns: debugpy port, HPA
#     removal (no metrics-server / prometheus-adapter in kind), removal of
#     CSI-mounted notification creds volume (no Secret-Store CSI driver in
#     kind -- creds come from a developer-provided plain Secret instead;
#     see secret-notification.yaml.example), DEBUG flags

resources:
  - namespace.yaml
  - ../../base/redis
  - ../../base/backend
  - ../../base/frontend
  - ../../base/fetcher
  - ../../base/summarizer
  - ../../base/digest
  # Real notification credentials for local digest testing. The file is
  # gitignored (see .gitignore: k8s/**/secret-*.yaml); each developer copies
  # secret-notification.yaml.example -> secret-notification.yaml and fills in
  # real LINE channel token + user-id (or Slack webhook). See
  # docs/local-development.md for setup. `kubectl kustomize` will fail until
  # the .yaml exists -- that's intentional, so missing creds surface early.
  - secret-notification.yaml

components:
  - ../../components/postgres-cnpg
  - ../../components/monitoring

patches:
  # Delete the backend HPA — kind has no metrics-server by default
  - patch: |
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: backend
        namespace: feedforge
  # Delete the summarizer HPA — uses an External metric (queue length via
  # prometheus-adapter), which isn't installed in the local kind cluster.
  - patch: |
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: summarizer
        namespace: feedforge
  - path: patches/backend-config-patch.yaml
  - path: patches/backend-service-patch.yaml
  - path: patches/digest-patch.yaml
