  - name: us-central1-docker.pkg.dev/project-76da2d1f-231c-4c94-ae9/feedforge/backend
    newTag: 90d9ebf503c332c4d1b428c61926404a3870be51
  - name: us-central1-docker.pkg.dev/project-76da2d1f-231c-4c94-ae9/feedforge/frontend
    newTag: 90d9ebf503c332c4d1b428c61926404a3870be51

patches:
