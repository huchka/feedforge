apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: feedforge-dev
  namespace: argocd
  labels:
    app.kubernetes.io/name: feedforge-dev
    app.kubernetes.io/part-of: feedforge
  finalizers:
    # Cascading delete: removing this Application also removes the workloads
    # it created. Without this, `kubectl delete app feedforge-dev` orphans the
    # Deployments. Revisit when prod arrives (#19).
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/huchka/feedforge.git
    targetRevision: HEAD
    path: k8s/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: feedforge

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # Prune in the final wave so renamed resources don't briefly disappear
      # mid-sync.
      - PruneLast=true

  # GKE's NEG controller writes these annotations on Services backing a
  # Gateway/Ingress. Without ignoring them, selfHeal flaps every few
  # seconds: Argo CD strips controller-set annotations → controller re-adds
  # them → drift → strip again. Both keys are GKE-managed:
  #   - cloud.google.com/neg: rewritten from {"ingress": true} (legacy form
  #     in our manifests) to {"exposed_ports":{...}} (explicit form).
  #   - cloud.google.com/neg-status: zones + NEG IDs, status only.
  ignoreDifferences:
    - group: ""
      kind: Service
      jqPathExpressions:
        - '.metadata.annotations."cloud.google.com/neg"'
        - '.metadata.annotations."cloud.google.com/neg-status"'

  revisionHistoryLimit: 10
